services:
  postgres:
    image: postgres:17-alpine
    container_name: refurbished-laptops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: refurbished_laptops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d refurbished_laptops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
